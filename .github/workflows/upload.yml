name: WhaleBets Auto Upload

on:
  schedule:
    # GitHub Actions cron'u UTC. TRT (UTC+3) hedefleri.
    # 4 cron / gün, içerik tipi rotation:
    #   2 trader (cüzdan portföyü)  + 2 movers (24h piyasa hareketleri)
    - cron: '0 12 * * *'   # 15:00 TRT  trader  (Asia East prime)
    - cron: '0 15 * * *'   # 18:00 TRT  movers  (India prime + US morning)
    - cron: '0 19 * * *'   # 22:00 TRT  trader  (US East lunch / West morning)
    - cron: '0 23 * * *'   # 02:00 TRT  movers  (US East evening peak)
  workflow_dispatch:
    inputs:
      content_type:
        description: 'Override content type (trader / movers / default-by-cron)'
        required: false
        default: 'default-by-cron'
        type: choice
        options:
          - default-by-cron
          - trader
          - movers

concurrency:
  group: upload-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Restore credentials from secrets
        run: |
          mkdir -p credentials
          printf '%s' '${{ secrets.YOUTUBE_TOKEN_JSON }}' > credentials/token.json
          printf '%s' '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > credentials/client_secret.json

      - name: Resolve content type for this firing
        id: ct
        run: |
          # Manual dispatch override wins; otherwise pick by cron schedule.
          MANUAL='${{ inputs.content_type }}'
          if [[ "$MANUAL" != "" && "$MANUAL" != "default-by-cron" ]]; then
            echo "CONTENT_TYPE=$MANUAL" >> $GITHUB_ENV
            echo "Resolved CONTENT_TYPE=$MANUAL (manual override)"
          else
            SCHED='${{ github.event.schedule }}'
            case "$SCHED" in
              "0 15 * * *"|"0 23 * * *")
                echo "CONTENT_TYPE=movers" >> $GITHUB_ENV
                echo "Resolved CONTENT_TYPE=movers (cron $SCHED)"
                ;;
              *)
                echo "CONTENT_TYPE=trader" >> $GITHUB_ENV
                echo "Resolved CONTENT_TYPE=trader (cron $SCHED)"
                ;;
            esac
          fi

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          DATA_SOURCE: polymarket
          POLYMARKET_WINDOW: Month
          POLYMARKET_METRIC: profit
          POLYMARKET_LEADERBOARD_LIMIT: '100'
          POLYMARKET_POSITIONS_PER_USER: '8'
          POLYMARKET_MAX_WALLETS_WITH_POSITIONS: '40'
          MIN_ROI_PERCENT: '10.0'
          MIN_WINRATE: '0.0'
          MIN_TRADES: '5'
          CONSISTENCY_WINDOW_DAYS: '90'
          MAX_WALLETS_PER_RUN: '8'
          TTS_PROVIDER: edge
          EDGE_VOICE: en-US-GuyNeural
          IMAGE_PROVIDER: none
          YOUTUBE_CLIENT_SECRETS_FILE: credentials/client_secret.json
          YOUTUBE_TOKEN_FILE: credentials/token.json
          YOUTUBE_CATEGORY_ID: '28'
          YOUTUBE_PRIVACY_STATUS: public
          YOUTUBE_MADE_FOR_KIDS: 'false'
          BURN_SUBTITLES: 'false'
          CAPTION_LANGUAGES: en,es,pt,hi,id,tr,zh,ko
          OUTPUT_DIR: ./output
          DRY_RUN: 'false'
          LOG_LEVEL: INFO
          TARGET_VIDEO_SECONDS: '30'
          HISTORY_FILE: ./output/history.json
          WALLET_LOOKBACK_DAYS: '14'
          POSITION_LOOKBACK_DAYS: '3'
          INCLUDE_DISCLAIMER: 'true'
        run: python main.py --once

      - name: Commit updated history
        if: always()
        run: |
          git config user.name  "WhaleBets Bot"
          git config user.email "bot@users.noreply.github.com"
          git add output/history.json 2>/dev/null || true
          if ! git diff --quiet --cached; then
            git commit -m "auto: history update [skip ci]"
            git push
          else
            echo "No history changes to commit."
          fi
